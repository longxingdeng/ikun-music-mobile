name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm install

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build Release APK (unsigned)
      run: |
        cd android
        ./gradlew assembleRelease
      continue-on-error: true

    - name: List APK files
      run: |
        echo "=== Debug APK files ==="
        find android/app/build/outputs/apk/debug -name "*.apk" || echo "No debug APK files found"
        echo "=== Release APK files ==="
        find android/app/build/outputs/apk/release -name "*.apk" || echo "No release APK files found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 🎵 ikun-music-mobile APK Release
          
          ### 新功能
          - ✅ 横屏播放界面优化 (歌词左侧，控制左下，图片右侧)
          - ✅ 下载时自动获取歌词功能
          - ✅ 歌词时间轴在线调节
          - ✅ 本地音乐搜索在线歌词
          
          ### 下载说明
          - **app-universal-debug.apk**: 调试版本，包含所有架构，文件较大
          - **app-universal-release-unsigned.apk**: 发布版本，未签名，需要允许安装未知来源应用
          
          ### 安装方法
          1. 下载对应的APK文件
          2. 在手机设置中允许安装未知来源应用
          3. 点击APK文件安装
          
          ### 测试重点
          - 横屏播放界面布局
          - 歌词下载和显示功能
          - 本地音乐库扫描
        files: |
          android/app/build/outputs/apk/debug/*.apk
          android/app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
