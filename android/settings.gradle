pluginManagement {
    repositories {
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        google()
        mavenCentral()
    }
}

rootProject.name = 'lx-music-mobile'
// 修复CI环境中的路径解析问题
def reactNativeDir = file("../node_modules/react-native")
def cliPlatformAndroidDir = file("../node_modules/@react-native-community/cli-platform-android")

if (reactNativeDir.exists()) {
    apply from: new File(reactNativeDir, "react.gradle")
} else {
    // 回退到动态解析
    apply from: new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../react.gradle')
}

if (cliPlatformAndroidDir.exists()) {
    apply from: new File(cliPlatformAndroidDir, "native_modules.gradle")
    applyNativeModulesSettingsGradle(settings)
} else {
    // 回退到动态解析
    apply from: new File(['node', '--print', "require.resolve('@react-native-community/cli-platform-android/package.json')"].execute(null, rootDir).text.trim(), '../native_modules.gradle')
    applyNativeModulesSettingsGradle(settings)
}
include ':app'
